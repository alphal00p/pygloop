[cli_overrides]
# TOML has no null value. Leave entries as "none" to use the CLI/default value.
m_top = "none"
m_higgs = "none"
n_loops = "none"
helicities = "none"
clean = "none"
toml_config_path = "none"
runtime_toml_config_path = "none"
gammaloop_settings = "none"

[process]
model = "sm-default.json"
initial_state = ["d", "d~"]
final_state = ["h", "h", "h"]
allowed_particles = ["d", "d~", "g", "h", "t", "t~"]
qed_order = 3
qcd_coupling_filter = "none"

[generation]
numerator_grouping = "no_grouping"
graph_prefix = "GL"
max_multiplicity_for_fast_cut_filter = 99
# External spin/color projector for the d(0) d~(1) amplitude. A scalar spin metric
# projector validates the tensor network but annihilates all helicity amplitudes.
global_prefactor_projector = "gammalooprs::u(0,spenso::bis(4,gammalooprs::hedge(0)))*gammalooprs::vbar(1,spenso::bis(4,gammalooprs::hedge(1)))*(1/3)*spenso::g(spenso::cof(3,gammalooprs::hedge(1)),spenso::dind(spenso::cof(3,gammalooprs::hedge(0))))"
veto_vertex_interactions = ["V_6", "V_9", "V_36", "V_37"]
number_of_fermion_loops = [1, 1]
# true passes --symmetrize-final-states true to feyngen, reducing the graph
# multiplicity for identical final-state bosons such as h h h. Set to false to
# explicitly disable it, or "none" to leave GammaLoop's default untouched.
symmetrize_final_states = true

# Leave disabled while iterating on DOT construction; enable to let pygloop
# call GammaLoop's generate existing command on the subtracted DOT.
generate_existing_after_selection = false

[counterterms]
build_isr = true
import_subtracted_dot = true
subtracted_suffix = "_top_pentagon_isr_subtracted"
# "leading" implements the paper's local NLO-like ISR collinear replacement
# of the light-line numerator by a spin identity times the longitudinal gluon
# momentum. "full" keeps the older diagnostic spin-projector variant.
projector_mode = "leading"
# "dummy" keeps the master graph connectivity and heavy-loop routing, marks the
# cancelled gluon edge dummy, and compensates GammaLoop's residual inverse-OSE
# bookkeeping in the graph-level numerator. "contract" removes the same
# propagator by contracting that edge into the light-line endpoint. "contract_loop"
# contracts the same edge into the heavy-loop endpoint and is useful to diagnose
# which custom topology lines up with GammaLoop's CFF routing. "dod_zero" is only
# a legacy debug placeholder.
denominator_strategy = "contract"
# "global" keeps the exact paper auxiliary denominator as an inverse factor in
# the graph-level numerator, which is useful for purely 4D algebra diagnostics
# but not for GammaLoop's CFF representation. "opposite_topology" mirrors the
# old qqx_aaa IR CT construction by keeping the opposite shifted light-line
# denominator active, so the loop-energy pole remains in the CFF topology.
# "spatial_proxy" removes that opposite propagator from the CT topology and
# keeps the fixed-zeta leading-power auxiliary denominator as a loop-energy-free
# spatial factor in the graph numerator. This is the current 3D CFF-compatible
# representation used by the local GammaLoop collinear tests.
# "exact_xi_topology" reserves two fake external ids, Q(2) incoming and Q(6)
# outgoing, remaps the physical Higgses to Q(3),Q(4),Q(5), and keeps the
# Kermanshah auxiliary denominator as an actual CT propagator carrying the
# fake xi shift. The original graphs receive the fake externals as is_dummy
# half-edges; CT graphs keep them non-dummy so GammaLoop's LMB signatures see xi.
auxiliary_denominator_mode = "spatial_proxy"
# Overall graph-global phase applied to ISR counterterm numerators only.
# The 3D GammaLoop CFF event convention returns these CTs with an extra +i
# phase relative to the original graph, so "-i" restores the local cancellation.
# For pure 4D algebra diagnostics, set this back to "1".
global_phase = "-i"
# Diagnostic scalar multiplier applied to all local ISR CT numerators. Keep at
# 1 for the paper-level Feynman-integrand representation; values different from
# 1 are useful to isolate GammaLoop CFF normalization effects.
normalization_factor = "1"
# Local IR CTs are UV-finite by construction here. Force all IR CT node/edge
# DOD attributes far negative, and keep GammaLoop's own UV generation disabled
# in the standalone run card and API generation path.
uv_inert_dod = -100
# Disabled by default. When enabled, the ISR auxiliary denominator uses a
# parametric reference vector xi instead of zeta = p1 + p2. The DOT registers
# these symbols as GammaLoop additional input parameters, and the standalone run
# card supplies the default numeric values below through
# default_runtime_settings.general.additional_param_values.
use_parametric_xi = false
xi_parameter_names = ["xi0", "xi1", "xi2", "xi3"]
xi_default_values = [1000.0, 0.0, 0.0, 100.0]

[standalone_run_card]
write_run_card = true
low_stat_n_start = 16
low_stat_n_max = 64
low_stat_n_cores = 1
low_stat_batch_size = 16
evaluator_summed_function_map = false
enable_threshold_subtraction = true

[standalone_tests]
gammaloop_cli_path = "/Users/vjhirsch/Documents/Work/gammaloop_dev/target/dev-optim/gammaloop"
command_timeout_seconds = 600
run_low_stat_integration = true

[tests]
smoke_test_original_graphs = 1
smoke_test_suffix = "_top_pentagon_isr_smoke"
# Collinear cancellation test driven by `pygloop --process qqbar_nX test_process`.
# The relevant gluon momentum is sent to k_gi = x p_i + k_perp. The routed
# bridge momentum k_1 is pinned by lmb_id=0 and follows from the graph routing,
# as assumed in Eq. (12)/(13).
collinear_fraction_x = 0.3
collinear_precision = "ArbPrec" # Double, Quad, or ArbPrec.
collinear_lambdas = [1.0, 0.1, 0.01, 0.001, 0.0001, 0.00001, 0.000001, 0.0000001]
collinear_arb_display_digits = 50

[selection.vertex_ids]
# sm-default vertex IDs used to recognize q-q-g, t-t-g, and t-t-H vertices.
light_quark_gluon = "V_74"
top_gluon = "V_137"
top_higgs = "V_141"
