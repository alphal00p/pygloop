# Universal standalone GammaLoop steering card for the symmetrized
# qqbar_nX exact-xi subtracted DOT. Run from the pygloop repository root.
#
# Loading this card only registers settings and command blocks. Use
# `run demo` or `run demo_with_thresholds`, or call the private template blocks
# with explicit `-D` context values.
commands = []

[cli_settings]
[cli_settings.state]
folder = "outputs/gammaloop_states/qqbar_nX_standalone_demo"
name = "qqbar_nX_standalone_demo"

[[command_blocks]]
name = "_load_subtracted_dot"
commands = [
    "set global kv global.generation.override_lmb_heuristics=true",
    "set global kv global.generation.uv.subtract_uv=false",
    "set global kv global.generation.uv.generate_integrated=false",
    "set global kv global.generation.uv.local_uv_cts_from_expanded_4d_integrands=false",
    "set global kv global.generation.threshold_subtraction.enable_thresholds={enable_thresholds}",
    "set global kv global.generation.threshold_subtraction.check_esurface_at_generation={check_esurface_at_generation}",
    "set global kv global.generation.threshold_subtraction.assume_positive_external_energies={assume_positive_external_energies}",
    "import model sm-default.json",
    "set model MT={m_top}",
    "set model MH={m_higgs}",
    "set model WT=0.0",
    "set model WH=0.0",
    "set model ymt={ymt}",
    "remove processes -p {process_name}",
    "import graphs {dot_path} -p {process_name} -i {integrand_name}"
]

[[command_blocks]]
name = "_generate_subtracted_integrand"
commands = [
    "run _load_subtracted_dot -D process_name={process_name} -D integrand_name={integrand_name} -D dot_path={dot_path} -D m_top={m_top} -D m_higgs={m_higgs} -D ymt={ymt} -D enable_thresholds={enable_thresholds} -D check_esurface_at_generation={check_esurface_at_generation} -D assume_positive_external_energies={assume_positive_external_energies} -D disable_threshold_subtraction={disable_threshold_subtraction}",
    "set global kv global.generation.override_lmb_heuristics=true",
    "set global kv global.generation.uv.subtract_uv=false",
    "set global kv global.generation.uv.generate_integrated=false",
    "set global kv global.generation.uv.local_uv_cts_from_expanded_4d_integrands=false",
    "set global kv global.generation.threshold_subtraction.enable_thresholds={enable_thresholds}",
    "set global kv global.generation.threshold_subtraction.check_esurface_at_generation={check_esurface_at_generation}",
    "set global kv global.generation.threshold_subtraction.assume_positive_external_energies={assume_positive_external_energies}",
    "generate existing -p {process_name} -i {integrand_name}"
]

[[command_blocks]]
name = "_generate_subtracted_integrand_ltd"
commands = [
    "run _load_subtracted_dot -D process_name={process_name} -D integrand_name={integrand_name} -D dot_path={dot_path} -D m_top={m_top} -D m_higgs={m_higgs} -D ymt={ymt} -D enable_thresholds={enable_thresholds} -D check_esurface_at_generation={check_esurface_at_generation} -D assume_positive_external_energies={assume_positive_external_energies} -D disable_threshold_subtraction={disable_threshold_subtraction}",
    "set global kv global.generation.override_lmb_heuristics=true",
    "set global kv global.generation.uv.subtract_uv=false",
    "set global kv global.generation.uv.generate_integrated=false",
    "set global kv global.generation.uv.local_uv_cts_from_expanded_4d_integrands=false",
    "set global kv global.generation.threshold_subtraction.enable_thresholds={enable_thresholds}",
    "set global kv global.generation.threshold_subtraction.check_esurface_at_generation={check_esurface_at_generation}",
    "set global kv global.generation.threshold_subtraction.assume_positive_external_energies={assume_positive_external_energies}",
    "set global kv global.3d_representation=LTD",
    "set global kv global.generation.explicit_orientation_sum_only=true",
    "generate existing -p {process_name} -i {integrand_name}"
]

[[command_blocks]]
name = "_inspect_runtime_pm"
commands = [
    "set process -p {process_name} -i {integrand_name} defaults",
    "set process -p {process_name} -i {integrand_name} kv subtraction.disable_threshold_subtraction={disable_threshold_subtraction}",
    """set process -p {process_name} -i {integrand_name} string '
[kinematics.externals.data]
helicities = [1, -1, 0, 0, 0, 0, 0, 0, 0]
'""",
    """set process -p {process_name} -i {integrand_name} string '
[sampling]
graphs = "monte_carlo"
orientations = "summed"
lmb_multichanneling = false
lmb_channels = "summed"
coordinate_system = "spherical"
mapping = "linear"
b = 1.0
'"""
]

